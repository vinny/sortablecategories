name: Tests

on:
  push:
    branches:
      - main
      - master
      - dev/*
  pull_request:
    branches:
      - main
      - master
      - dev/*

jobs:
  call-tests:
    name: Extension tests
    uses: phpbb-extensions/test-framework/.github/workflows/tests.yml@3.3.x
    with:
      EXTNAME: vinny/sortablecategories
